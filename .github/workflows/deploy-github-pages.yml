name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static HTML site
        run: node scripts/build-github-pages-static.mjs

      - name: Disable Vercel auto-deploy for gh-pages branch
        run: |
          cat > out/vercel.json << 'EOF'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "git": {
              "deploymentEnabled": false
            }
          }
          EOF

      - name: Verify build output
        run: test -f out/recipes/recipe-1/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true

      # Also publish to main branch root so Pages works when source is main / (root).
      - name: Publish static site to main branch root
        run: |
          cp -r out/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f index.html 404.html .nojekyll assets dish recipes shopping-list history expenses account add-recipe
          git diff --staged --quiet || git commit -m "chore: publish static site for GitHub Pages [skip ci]"
          git push
